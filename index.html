<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vynk Home | Smart OS Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #6366f1;
            --text-dim: #666666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { 
            background: var(--bg); 
            color: white; 
            min-height: 100vh; 
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated Background Orbs for Depth */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
        }
        body::before { top: -150px; right: -150px; }
        body::after { bottom: -150px; left: -150px; animation-duration: 25s; animation-delay: -5s; }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(-100px, 100px); }
        }

        /* Smooth Page Transition */
        #page-loader { 
            position: fixed; inset: 0; background: var(--bg); 
            z-index: 9999; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
            opacity: 1; pointer-events: none; 
        }
        body.loaded #page-loader { opacity: 0; }

        /* Floating Navigation Pill */
        .float-nav { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); 
            padding: 12px 30px; border-radius: 100px; 
            border: 1px solid rgba(255,255,255,0.1); 
            z-index: 2000; display: flex; gap: 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
        }
        .float-nav a { color: #888; text-decoration: none; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .float-nav a:hover { color: var(--accent); }
        .float-nav a.active { color: white; }

        /* Hero Content (Video 3 Similarity) */
        .hero { text-align: center; max-width: 800px; padding: 0 20px; z-index: 10; }
        .badge { 
            display: inline-block; padding: 8px 16px; border-radius: 100px;
            background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2);
            color: var(--accent); font-size: 12px; font-weight: 700; text-transform: uppercase;
            margin-bottom: 24px; letter-spacing: 1px;
        }
        .hero h1 { 
            font-size: 5rem; font-weight: 800; line-height: 0.95; 
            letter-spacing: -4px; margin-bottom: 30px; 
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero p { color: var(--text-dim); font-size: 1.25rem; margin-bottom: 40px; line-height: 1.6; max-width: 550px; margin-inline: auto; }

        .btn-primary { 
            padding: 18px 45px; background: var(--accent); color: white; 
            border-radius: 18px; text-decoration: none; font-weight: 700; 
            display: inline-block; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 25px 50px rgba(99, 102, 241, 0.4); }

    </style>
</head>
<body>
    <div id="page-loader"></div>

    <nav class="float-nav">
        <a href="index.html" class="active">Home</a>
        <a href="devices.html">Devices</a>
        <a href="security.html">Security</a>
    </nav>

    <main class="hero">
        <div class="badge">Anhad '26 Experience</div>
        <h1>Intelligence<br>At Every Corner.</h1>
        <p>Transforming your living space into a high-performance ecosystem with Vynk Home OS.</p>
        <a href="devices.html" class="btn-primary">Explore Devices</a>
    </main>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 100);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Devices | Vynk Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #6366f1; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { 
            background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; position: relative;
        }

        body::before, body::after {
            content: ''; position: fixed; width: 600px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
            filter: blur(80px); z-index: -1; animation: float 20s infinite alternate;
        }
        body::before { top: -150px; right: -150px; }
        body::after { bottom: -150px; left: -150px; animation-duration: 25s; animation-delay: -5s; }

        @keyframes float { from { transform: translate(0, 0); } to { transform: translate(-100px, 100px); } }

        #page-loader { position: fixed; inset: 0; background: var(--bg); z-index: 9999; transition: 0.8s ease; opacity: 1; pointer-events: none; }
        body.loaded #page-loader { opacity: 0; }

        .float-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); padding: 12px 28px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); z-index: 2000; display: flex; gap: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .float-nav a { color: #666; text-decoration: none; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .float-nav a:hover { color: white; }

        .header { max-width: 1100px; margin: 80px auto 40px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .switcher { display: flex; background: rgba(255,255,255,0.05); padding: 6px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); }
        .s-btn { padding: 10px 24px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; background: transparent; color: #555; transition: 0.3s; }
        .s-btn.active { background: var(--accent); color: white; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        .container { max-width: 1100px; margin: 0 auto; display: grid; gap: 25px; padding: 0 20px 100px; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(12px); border-radius: 32px; padding: 25px; transition: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 22px; margin-bottom: 20px; }
        
        .mode-grid { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
        .mode-list { grid-template-columns: 1fr; }
        .mode-list .card { display: flex; align-items: center; gap: 30px; padding: 20px 40px; }
        .mode-list .card img { width: 100px; height: 100px; margin: 0; }

        .mode-stack { display: flex; justify-content: center; height: 500px; position: relative; margin-top: 40px; }
        .mode-stack .card { position: absolute; width: 380px; box-shadow: 0 40px 80px rgba(0,0,0,0.6); }
        .mode-stack .card:nth-child(1) { transform: translateY(0); z-index: 3; }
        .mode-stack .card:nth-child(2) { transform: translateY(-40px) scale(0.95); opacity: 0.5; z-index: 2; }
        .mode-stack .card:nth-child(3) { transform: translateY(-80px) scale(0.9); opacity: 0.2; z-index: 1; }

        .changing { opacity: 0; transform: translateY(15px) scale(0.98); }
    </style>
</head>
<body>
    <div id="page-loader"></div>
    <nav class="float-nav">
        <a href="index.html">Home</a>
        <a href="devices.html" style="color:white">Devices</a>
        <a href="security.html">Security</a>
    </nav>

    <div class="header">
        <h1 style="font-weight:800; font-size:2.5rem; letter-spacing:-2px;">Smart Devices</h1>
        <div class="switcher">
            <button class="s-btn active" onclick="updateMode('grid', this)">Grid</button>
            <button class="s-btn" onclick="updateMode('list', this)">List</button>
            <button class="s-btn" onclick="updateMode('stack', this)">Stack</button>
        </div>
    </div>

    <div id="main-grid" class="container mode-grid">
        <div class="card"><img src="asset1.jpg"><h3>Living Room Hub</h3><p>Active • 22.5°C</p></div>
        <div class="card"><img src="asset2.jpg"><h3>Entryway Cam</h3><p>Live Streaming</p></div>
        <div class="card"><img src="asset1.jpg"><h3>Garage Door</h3><p>Closed • Secure</p></div>
    </div>

    <script>
        window.addEventListener('load', () => document.body.classList.add('loaded'));
        function updateMode(m, btn) {
            const g = document.getElementById('main-grid');
            g.classList.add('changing');
            document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            setTimeout(() => {
                g.className = 'container mode-' + m;
                g.classList.remove('changing');
            }, 450);
        }
    </script>
</body>
</html>
